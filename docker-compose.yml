version: '3.8'

services:
  montagu-web:
    build: .
    container_name: montagu-web
    restart: always
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      # HTTPS Router
      - "traefik.http.routers.montagu-web-secure.rule=Host(`www.montaguoriginals.com`) || Host(`montaguoriginals.com`)"
      - "traefik.http.routers.montagu-web-secure.entrypoints=websecure"
      - "traefik.http.routers.montagu-web-secure.tls=true"
      - "traefik.http.routers.montagu-web-secure.tls.certresolver=le"
      - "traefik.http.routers.montagu-web-secure.service=montagu-web-service"
      
      # HTTP Router (Redirect to HTTPS)
      - "traefik.http.routers.montagu-web-http.rule=Host(`www.montaguoriginals.com`) || Host(`montaguoriginals.com`)"
      - "traefik.http.routers.montagu-web-http.entrypoints=web"
      - "traefik.http.routers.montagu-web-http.middlewares=montagu-redirect"
      
      # Middleware: Redirect to HTTPS
      - "traefik.http.middlewares.montagu-redirect.redirectscheme.scheme=https"
      
      # Service definition
      - "traefik.http.services.montagu-web-service.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy-net"

networks:
  proxy-net:
    external: true
