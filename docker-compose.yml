version: '3.8'

services:
  montagu-web:
    build: .
    container_name: montagu-web
    restart: always
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.montagu-web.rule=Host(`www.montaguoriginals.com`) || Host(`montaguoriginals.com`)"
      - "traefik.http.routers.montagu-web.entrypoints=websecure"
      - "traefik.http.routers.montagu-web.tls.certresolver=myresolver"
      - "traefik.http.services.montagu-web.loadbalancer.server.port=80"

networks:
  traefik_proxy:
    external: true
