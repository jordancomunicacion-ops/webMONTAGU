<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Graffiti Assets</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rock+Salt&display=swap" rel="stylesheet">
<style>
  body {
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    gap: 100px;
  }
  .graffiti {
    font-family: 'Permanent Marker', cursive;
    position: relative;
  }
  .blue-tag {
    font-size: 6rem;
    color: #00F2FF;
    text-shadow: 0 0 10px #00F2FF, 0 0 20px #00F2FF, 4px 4px 5px rgba(0,0,0,0.2);
    transform: rotate(-3deg);
  }
  .pink-tag {
    font-size: 5rem;
    color: #FF007F;
    text-shadow: 0 0 10px #FF007F, 0 0 20px #FF007F, 4px 4px 5px rgba(0,0,0,0.2);
    transform: rotate(2deg);
  }
</style>
</head>
<body>
  <div class="graffiti blue-tag">EST. 2024</div>
  <div class="graffiti pink-tag">THE ORIGINAL REBEL</div>
</body>
</html>
