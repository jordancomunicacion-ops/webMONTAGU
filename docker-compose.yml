version: '3.8'

services:
  montagu-web:
    build: .
    container_name: montagu-web
    restart: always
    networks:
      - proxy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.montagu-web.rule=Host(`www.montaguoriginals.com`) || Host(`montaguoriginals.com`)"
      - "traefik.http.routers.montagu-web.entrypoints=websecure"
      - "traefik.http.routers.montagu-web.tls=true"
      - "traefik.http.routers.montagu-web.tls.certresolver=le"
      - "traefik.http.services.montagu-web.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy-net"

networks:
  proxy-net:
    external: true
